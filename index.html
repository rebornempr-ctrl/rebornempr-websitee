<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReBorn Empr — Rise From The Ashes. Dominate The Empire.</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #030508;
  --bg2: #080c14;
  --card: #0d1220;
  --border: #1a2540;
  --accent: #e8621a;
  --accent2: #ff8c42;
  --gold: #f5a623;
  --blue: #1e6fff;
  --text: #c8d8f0;
  --text2: #6a84b0;
  --white: #ffffff;
  --danger: #ff3355;
  --success: #00e599;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  font-size:16px;
  overflow-x:hidden;
  min-height:100vh;
}

/* ============ PHOENIX CANVAS BG ============ */
#phoenix-canvas{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  z-index:0;
  pointer-events:none;
  opacity:0.18;
}

/* ============ NOISE OVERLAY ============ */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.03;
  z-index:1;
  pointer-events:none;
}

/* ============ LAYOUT ============ */
#app{position:relative;z-index:2;}

/* ============ NAV ============ */
nav{
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  background:rgba(3,5,8,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
}

.nav-logo{
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
}
.nav-logo img{
  height:40px;width:40px;
  border-radius:50%;
  border:2px solid var(--accent);
  box-shadow:0 0 16px rgba(232,98,26,0.5);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:0 0 16px rgba(232,98,26,0.5);}
  50%{box-shadow:0 0 32px rgba(232,98,26,0.9),0 0 60px rgba(232,98,26,0.3);}
}
.nav-brand{
  font-family:'Cinzel Decorative',serif;
  font-size:14px;
  font-weight:700;
  color:var(--white);
  letter-spacing:1px;
}

.nav-links{
  display:flex;align-items:center;gap:4px;
}
.nav-links a{
  color:var(--text2);
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:6px 12px;
  border-radius:4px;
  transition:all 0.2s;
  cursor:pointer;
}
.nav-links a:hover,.nav-links a.active{
  color:var(--accent);
  background:rgba(232,98,26,0.1);
}

.nav-auth{display:flex;align-items:center;gap:10px;}
#nav-user-info{
  font-size:12px;color:var(--text2);
  display:none;align-items:center;gap:8px;
}
#nav-user-info span{color:var(--accent);}
.btn-sm{
  padding:6px 16px;
  border-radius:4px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  border:none;
  transition:all 0.2s;
}
.btn-login{background:transparent;border:1px solid var(--accent);color:var(--accent);}
.btn-login:hover{background:var(--accent);color:#000;}
.btn-logout{background:transparent;border:1px solid var(--text2);color:var(--text2);}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.hamburger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px;transition:all 0.3s;}

/* ============ PAGES ============ */
.page{display:none;padding-top:64px;min-height:100vh;}
.page.active{display:block;}

/* ============ HERO ============ */
#page-home{
  display:none;
  background:radial-gradient(ellipse 80% 60% at 50% 20%, rgba(232,98,26,0.08) 0%, transparent 70%);
}
#page-home.active{display:block;}

.hero{
  min-height:calc(100vh - 64px);
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  padding:60px 32px;
  position:relative;
}

.hero-content{position:relative;z-index:2;}

.hero-badge{
  display:inline-block;
  background:rgba(232,98,26,0.15);
  border:1px solid rgba(232,98,26,0.4);
  color:var(--accent);
  font-size:11px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:6px 20px;
  border-radius:2px;
  margin-bottom:32px;
  animation:fadeUp 0.8s ease both;
}

.hero-logo{
  width:160px;height:160px;
  border-radius:50%;
  border:3px solid var(--accent);
  box-shadow:0 0 60px rgba(232,98,26,0.4),0 0 120px rgba(232,98,26,0.15);
  margin:0 auto 32px;
  display:block;
  animation:fadeUp 0.8s 0.1s ease both, logoPulse 3s 1s infinite;
}

.hero-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(32px,6vw,72px);
  font-weight:900;
  color:var(--white);
  line-height:1.1;
  margin-bottom:16px;
  animation:fadeUp 0.8s 0.2s ease both;
}
.hero-title .empr{
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero-tagline{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(11px,2vw,14px);
  color:var(--text2);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:48px;
  animation:fadeUp 0.8s 0.3s ease both;
}

.hero-stats{
  display:flex;justify-content:center;gap:48px;flex-wrap:wrap;
  margin-bottom:48px;
  animation:fadeUp 0.8s 0.4s ease both;
}
.stat{text-align:center;}
.stat-num{
  font-family:'Orbitron',sans-serif;
  font-size:32px;font-weight:800;
  color:var(--accent);
  display:block;
}
.stat-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}

.hero-cta{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  animation:fadeUp 0.8s 0.5s ease both;
}
.btn{
  padding:14px 32px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  border:none;
  border-radius:4px;
  cursor:pointer;
  text-decoration:none;
  transition:all 0.25s;
  display:inline-block;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#c94f0f);
  color:#fff;
  box-shadow:0 0 24px rgba(232,98,26,0.4);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(232,98,26,0.6);}
.btn-secondary{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* ============ SECTION COMMON ============ */
.section{padding:80px 32px;max-width:1200px;margin:0 auto;}
.section-header{text-align:center;margin-bottom:60px;}
.section-label{
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);font-weight:700;margin-bottom:12px;display:block;
}
.section-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(24px,4vw,40px);
  font-weight:700;color:var(--white);
  margin-bottom:16px;
}
.section-sub{font-size:15px;color:var(--text2);max-width:600px;margin:0 auto;}

.divider{
  width:60px;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:20px auto 0;
}

/* ============ TEAM CARDS ============ */
.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.player-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:28px 24px;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
  cursor:default;
}
.player-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity 0.3s;
}
.player-card:hover{
  border-color:rgba(232,98,26,0.4);
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
.player-card:hover::before{opacity:1;}

.player-card.igl{border-color:rgba(245,166,35,0.4);}
.player-card.igl::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:1;}
.player-card.collab{border-color:rgba(30,111,255,0.3);}
.player-card.manager{border-color:rgba(0,229,153,0.3);}

.player-tag-badge{
  position:absolute;top:16px;right:16px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  padding:3px 10px;border-radius:2px;font-weight:700;
}
.badge-igl{background:rgba(245,166,35,0.15);color:var(--gold);border:1px solid rgba(245,166,35,0.3);}
.badge-rusher{background:rgba(255,51,85,0.1);color:#ff6680;border:1px solid rgba(255,51,85,0.2);}
.badge-bomber{background:rgba(232,98,26,0.15);color:var(--accent2);border:1px solid rgba(232,98,26,0.3);}
.badge-manager{background:rgba(0,229,153,0.1);color:var(--success);border:1px solid rgba(0,229,153,0.2);}
.badge-collab{background:rgba(30,111,255,0.1);color:#6699ff;border:1px solid rgba(30,111,255,0.2);}

.player-avatar{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#c94f0f);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-size:22px;font-weight:800;color:#fff;
  margin-bottom:16px;
  box-shadow:0 8px 24px rgba(232,98,26,0.3);
}
.player-card.igl .player-avatar{background:linear-gradient(135deg,var(--gold),#c98000);}
.player-card.manager .player-avatar{background:linear-gradient(135deg,var(--success),#009966);}
.player-card.collab .player-avatar{background:linear-gradient(135deg,var(--blue),#0a3daa);}

.player-ign{
  font-family:'Orbitron',sans-serif;
  font-size:15px;font-weight:700;color:var(--white);
  margin-bottom:4px;
}
.player-name{font-size:13px;color:var(--text2);margin-bottom:8px;}
.player-role{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:1px;}
.player-tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.tag{
  font-size:10px;padding:2px 8px;border-radius:2px;
  background:rgba(255,255,255,0.05);
  color:var(--text2);letter-spacing:1px;
  border:1px solid var(--border);
}

/* eFootball section */
.efootball-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}
.efb-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px;
  text-align:center;
  transition:all 0.3s;
}
.efb-card:hover{border-color:rgba(30,111,255,0.4);transform:translateY(-3px);}
.efb-id{
  font-family:'Orbitron',sans-serif;
  font-size:20px;font-weight:700;color:var(--blue);
  margin-bottom:6px;
}
.efb-player{font-size:14px;color:var(--white);font-weight:600;}
.efb-game{font-size:11px;color:var(--text2);letter-spacing:2px;margin-top:4px;}

/* ============ TOURNAMENTS ============ */
.tournament-list{display:flex;flex-direction:column;gap:16px;}
.tournament-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  flex-wrap:wrap;
  transition:all 0.3s;
}
.tournament-card:hover{border-color:rgba(232,98,26,0.3);transform:translateX(4px);}
.t-info{flex:1;}
.t-name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--white);margin-bottom:6px;}
.t-meta{font-size:13px;color:var(--text2);}
.t-status{
  padding:6px 16px;border-radius:4px;
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  white-space:nowrap;
}
.status-upcoming{background:rgba(30,111,255,0.15);color:#6699ff;border:1px solid rgba(30,111,255,0.3);}
.status-active{background:rgba(0,229,153,0.15);color:var(--success);border:1px solid rgba(0,229,153,0.3);}
.status-dream{background:rgba(245,166,35,0.15);color:var(--gold);border:1px solid rgba(245,166,35,0.3);}
.status-completed{background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border);}

/* ============ ACHIEVEMENTS ============ */
.achievements-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}
.achievement-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:28px 24px;
  text-align:center;
  transition:all 0.3s;
  position:relative;overflow:hidden;
}
.achievement-card:hover{border-color:rgba(245,166,35,0.4);transform:translateY(-4px);}
.ach-icon{font-size:48px;margin-bottom:16px;display:block;}
.ach-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--white);margin-bottom:8px;}
.ach-desc{font-size:13px;color:var(--text2);}
.ach-date{font-size:11px;color:var(--accent);margin-top:12px;letter-spacing:2px;}

/* ============ SCHEDULE ============ */
.schedule-list{display:flex;flex-direction:column;gap:12px;}
.schedule-item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px 24px;
  display:grid;
  grid-template-columns:120px 1fr auto;
  align-items:center;
  gap:20px;
  transition:all 0.3s;
}
.schedule-item:hover{border-color:rgba(232,98,26,0.3);}
.s-date{
  font-family:'Orbitron',sans-serif;
  font-size:13px;font-weight:700;color:var(--accent);
}
.s-event{color:var(--white);font-weight:600;}
.s-time{font-size:12px;color:var(--text2);margin-top:4px;}
.s-type{
  font-size:10px;letter-spacing:2px;padding:4px 12px;border-radius:2px;
  background:rgba(232,98,26,0.1);color:var(--accent);
  border:1px solid rgba(232,98,26,0.2);text-transform:uppercase;font-weight:700;
}

/* ============ ANNOUNCEMENTS ============ */
.announcement-list{display:flex;flex-direction:column;gap:16px;}
.announcement-card{
  background:var(--card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:8px;
  padding:24px 28px;
  transition:all 0.3s;
}
.announcement-card:hover{transform:translateX(4px);border-color:rgba(232,98,26,0.4);}
.ann-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.ann-title{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--white);}
.ann-date{font-size:12px;color:var(--text2);}
.ann-body{font-size:14px;color:var(--text);line-height:1.7;}
.ann-tag{
  display:inline-block;
  padding:2px 10px;border-radius:2px;
  font-size:10px;font-weight:700;letter-spacing:2px;
  background:rgba(232,98,26,0.15);color:var(--accent);
  border:1px solid rgba(232,98,26,0.3);
  margin-bottom:8px;text-transform:uppercase;
}

/* ============ CONTACT / SOCIAL ============ */
.social-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}
.social-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
  display:flex;align-items:center;gap:16px;
  text-decoration:none;
  transition:all 0.3s;
  cursor:pointer;
}
.social-card:hover{transform:translateY(-4px);}
.social-icon{
  width:48px;height:48px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.social-label{font-size:11px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:4px;}
.social-name{font-weight:700;color:var(--white);font-size:15px;}

.discord-card{border-color:rgba(88,101,242,0.3);}
.discord-card:hover{border-color:rgba(88,101,242,0.6);box-shadow:0 12px 32px rgba(88,101,242,0.2);}
.discord-icon{background:rgba(88,101,242,0.15);}

.wa-card{border-color:rgba(37,211,102,0.3);}
.wa-card:hover{border-color:rgba(37,211,102,0.6);box-shadow:0 12px 32px rgba(37,211,102,0.2);}
.wa-icon{background:rgba(37,211,102,0.15);}

.ig-card{border-color:rgba(228,64,95,0.3);}
.ig-card:hover{border-color:rgba(228,64,95,0.6);box-shadow:0 12px 32px rgba(228,64,95,0.2);}
.ig-icon{background:rgba(228,64,95,0.15);}

.tt-card{border-color:rgba(0,242,234,0.3);}
.tt-card:hover{border-color:rgba(0,242,234,0.6);box-shadow:0 12px 32px rgba(0,242,234,0.2);}
.tt-icon{background:rgba(0,242,234,0.15);}

.gh-card{border-color:rgba(255,255,255,0.1);}
.gh-card:hover{border-color:rgba(255,255,255,0.3);box-shadow:0 12px 32px rgba(255,255,255,0.05);}
.gh-icon{background:rgba(255,255,255,0.07);}

/* ============ AUTH MODAL ============ */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
.modal-overlay.open{display:flex;}

.modal{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:40px;
  width:100%;max-width:420px;
  position:relative;
  animation:modalIn 0.3s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)translateY(20px);}to{opacity:1;transform:scale(1)translateY(0);}}

.modal-close{
  position:absolute;top:16px;right:16px;
  background:none;border:none;color:var(--text2);
  font-size:20px;cursor:pointer;line-height:1;
  transition:color 0.2s;
}
.modal-close:hover{color:var(--white);}

.modal-logo{text-align:center;margin-bottom:28px;}
.modal-logo img{width:56px;height:56px;border-radius:50%;border:2px solid var(--accent);}
.modal-title{
  font-family:'Cinzel Decorative',serif;
  font-size:18px;font-weight:700;color:var(--white);
  text-align:center;margin-top:12px;
}
.modal-sub{font-size:13px;color:var(--text2);text-align:center;margin-top:6px;}

.auth-tabs{display:flex;margin-bottom:28px;border-bottom:1px solid var(--border);}
.auth-tab{
  flex:1;padding:12px;text-align:center;
  font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;
}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.form-group{margin-bottom:18px;}
.form-label{
  display:block;font-size:12px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--text2);margin-bottom:8px;
}
.form-input{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 16px;
  color:var(--white);
  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  transition:border-color 0.2s;
  outline:none;
}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text2);}

.btn-full{width:100%;padding:14px;font-size:14px;margin-top:8px;}
.auth-msg{
  font-size:13px;text-align:center;margin-top:12px;
  padding:10px;border-radius:6px;display:none;
}
.auth-msg.error{background:rgba(255,51,85,0.1);color:var(--danger);border:1px solid rgba(255,51,85,0.2);}
.auth-msg.success{background:rgba(0,229,153,0.1);color:var(--success);border:1px solid rgba(0,229,153,0.2);}
.auth-msg.show{display:block;}

/* ============ FOOTER ============ */
footer{
  border-top:1px solid var(--border);
  padding:32px;
  text-align:center;
}
.footer-logo{
  font-family:'Cinzel Decorative',serif;
  font-size:16px;color:var(--white);margin-bottom:8px;
}
.footer-tag{font-size:12px;color:var(--text2);letter-spacing:3px;margin-bottom:16px;}
.footer-copy{font-size:12px;color:var(--text2);opacity:0.5;}

/* ============ LOADING SPINNER ============ */
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  animation:spin 0.8s linear infinite;
  margin:60px auto;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============ EMPTY STATE ============ */
.empty-state{
  text-align:center;padding:80px 32px;
  color:var(--text2);
}
.empty-state .icon{font-size:56px;margin-bottom:16px;display:block;opacity:0.3;}
.empty-state h3{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--text2);margin-bottom:8px;}
